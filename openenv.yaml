name: support-ticket-triage
version: "0.1.0"
description: |
  A realistic support‑ticket triage environment where an LLM agent receives a ticket,
  can query a knowledge‑base, propose a resolution, and optionally request escalation.
  Designed for OpenEnv benchmarking.
author: "SupportEnv Team <support@example.com>"
license: MIT
tags:
  - support
  - triage
  - real-world
  - openenv
environment:
  python_package: supportenv.server
  entrypoint: SupportEnvironment
actions:
  - name: classify
    description: "Classify the ticket into a category."
    parameters:
      content:
        type: string
        description: "Category name."
  - name: respond
    description: "Send a reply to the customer."
    parameters:
      content:
        type: string
        description: "Reply text."
      confidence:
        type: float
        description: "Optional confidence score (0.0‑1.0)."
        minimum: 0.0
        maximum: 1.0
  - name: lookup_kb
    description: "Search internal knowledge‑base for relevant articles."
    parameters:
      content:
        type: string
        description: "Search term."
  - name: escalate
    description: "Escalate the ticket to a senior agent."
    parameters: {}
  - name: request_info
    description: "Request additional information from the customer."
    parameters:
      content:
        type: string
        description: "Information requested (e.g., order ID, email, screenshot)."
  - name: resolve
    description: "Mark the ticket as resolved with final resolution text."
    parameters:
      content:
        type: string
        description: "Resolution text."
observations:
  - name: ticket
    description: "Current ticket details."
    fields:
      id:
        type: integer
      subject:
        type: string
      body:
        type: string
      status:
        type: string
        enum: [open, pending, resolved, escalated]
  - name: kb_results
    description: "Results returned by a KB lookup."
    fields:
      articles:
        type: array
        items:
          type: string
reward:
  description: |
    Positive reward for each correct resolution step, small step‑penalty to discourage loops,
    and a large penalty for invalid actions.
  range: [0.0, 1.0]